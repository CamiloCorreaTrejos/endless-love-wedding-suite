<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless Love Organizer</title>
    <script>
      // Global Error Handlers for debugging
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("GLOBAL_ERROR:", message, "at", source, ":", lineno);
      };
      window.onunhandledrejection = function(event) {
        console.error("UNHANDLED_REJECTION:", event.reason);
      };

      // Workaround for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when some libraries try to polyfill fetch in a restricted environment.
      (function() {
        console.log("[System] Initializing fetch workaround...");
        try {
          const nativeFetch = window.fetch;
          
          // Try to redefine the property to be writable
          try {
            Object.defineProperty(window, 'fetch', {
              value: nativeFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
            console.log("[System] fetch property redefined successfully.");
          } catch (e) {
            console.log("[System] defineProperty failed, trying setter workaround...");
            // If we can't make it writable, try to at least add a no-op setter to prevent crashes
            try {
              Object.defineProperty(window, 'fetch', {
                get: function() { return nativeFetch; },
                set: function(v) { console.warn("[System] Blocked attempt to overwrite window.fetch"); },
                configurable: true,
                enumerable: true
              });
              console.log("[System] fetch setter workaround applied.");
            } catch (e2) {
              console.warn("[System] All fetch workarounds failed. Property is likely non-configurable.");
            }
          }
        } catch (e) {
          console.warn("[System] Fetch workaround critical failure:", e);
        }
      })();

      // Runtime Environment Variables Injection
      window.__ENV__ = {
        VITE_SUPABASE_URL: "",
        VITE_SUPABASE_ANON_KEY: ""
      };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #fcfbf7;
      }
      h1, h2, h3, .serif {
        font-family: 'Playfair Display', serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
