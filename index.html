<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless Love Organizer</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#0F1A2E">
    <script>
      // Global Error Handlers for debugging
      window.onerror = function(message, source, lineno, colno, error) {
        console.error("GLOBAL_ERROR:", message, "at", source, ":", lineno);
      };
      window.onunhandledrejection = function(event) {
        console.error("UNHANDLED_REJECTION:", event.reason);
      };
      
      // Make window.fetch writable to prevent errors from libraries that try to polyfill it
      if (typeof window !== 'undefined' && window.fetch) {
        try {
          let currentFetch = window.fetch.bind(window);
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return currentFetch; },
            set: function(v) { 
              console.warn('Intercepted window.fetch assignment');
              currentFetch = typeof v === 'function' ? v.bind(window) : v; 
            }
          });
        } catch (e) {
          console.error("Failed to redefine fetch:", e);
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Montserrat', sans-serif;
        background-color: #fcfbf7;
      }
      h1, h2, h3, .serif {
        font-family: 'Montserrat', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
